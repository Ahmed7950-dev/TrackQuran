    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
        document.documentElement.removeAttribute('data-theme');
      } else if (savedTheme === 'reading') {
        document.documentElement.setAttribute('data-theme', 'reading');
        document.documentElement.classList.remove('dark');
      } else {
        // Default to light, but check system preference if no saved theme
        if (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        document.documentElement.removeAttribute('data-theme');
      }
      // Set language and direction
      const lang = localStorage.getItem('language') || 'en';
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      // Initialize font preference
      const savedFont = localStorage.getItem('quranicFont') || 'Hafs';
      document.documentElement.style.setProperty('--quranic-font', savedFont);
    </script>
    <script src="https://unpkg.com/heroicons@2.1.3/24/outline/index.js"></script>

    <style>
      body {
        /* This will be overridden by tailwind classes */
        background-color: #f0f4f8;
        font-family: 'Inter', sans-serif;
      }
      .dark body {
        background-color: #111827; /* Corresponds to gray-900 */
      }
      [data-theme="reading"] body {
        background-color: #faf8f3; /* Warm cream background for reading mode */
      }
      /* Reading mode color overrides */
      [data-theme="reading"] .bg-slate-100,
      [data-theme="reading"] .bg-white {
        background-color: #f5f1e8 !important; /* Warm cream for cards/panels */
      }
      [data-theme="reading"] .bg-gray-800,
      [data-theme="reading"] .bg-gray-900 {
        background-color: #f5f1e8 !important;
      }
      [data-theme="reading"] .bg-gray-700 {
        background-color: #ede7d9 !important; /* Lighter cream for secondary elements */
      }
      [data-theme="reading"] .text-slate-800,
      [data-theme="reading"] .text-slate-700 {
        color: #3d3528 !important; /* Warm dark brown for primary text */
      }
      [data-theme="reading"] .text-slate-600 {
        color: #5a5142 !important; /* Medium brown */
      }
      [data-theme="reading"] .text-slate-500 {
        color: #7a7060 !important; /* Lighter brown for secondary text */
      }
      [data-theme="reading"] .text-slate-400,
      [data-theme="reading"] .text-slate-300,
      [data-theme="reading"] .text-slate-200 {
        color: #9a9080 !important; /* Light brown for muted text */
      }
      [data-theme="reading"] .border-slate-200,
      [data-theme="reading"] .border-slate-300 {
        border-color: #e8e0d3 !important; /* Light beige for borders */
      }
      [data-theme="reading"] .border-gray-600,
      [data-theme="reading"] .border-gray-700 {
        border-color: #d4c9b8 !important;
      }
      [data-theme="reading"] .hover\:bg-slate-100:hover,
      [data-theme="reading"] .hover\:bg-slate-200:hover {
        background-color: #ede7d9 !important; /* Light cream for hover */
      }
      [data-theme="reading"] .hover\:bg-gray-700:hover {
        background-color: #ddd4c4 !important;
      }
      [data-theme="reading"] .shadow-md,
      [data-theme="reading"] .shadow-lg,
      [data-theme="reading"] .shadow-xl {
        box-shadow: 0 4px 6px -1px rgba(61, 53, 40, 0.1), 0 2px 4px -1px rgba(61, 53, 40, 0.06) !important;
      }
      [data-theme="reading"] input,
      [data-theme="reading"] textarea,
      [data-theme="reading"] select {
        background-color: #fefcf8 !important; /* Slightly lighter cream for inputs */
        color: #3d3528 !important;
      }
      [data-theme="reading"] input::placeholder,

        color: #9a9080 !important;
      }
      [data-theme="reading"] .bg-gray-600 {
        background-color: #ddd4c4 !important;
      }
       html[lang="ar"] body {
        font-family: 'Hafs', 'Cairo', sans-serif;
      }
      /* ── Quranic / Arabic script fonts ────────────────────────────────────
         font-display: block  →  browser waits (text invisible) rather than
         showing the system fallback. System Arabic fonts have no Quranic
         ligatures, so they render letters disconnected. Invisible-then-correct
         is vastly better than immediately-wrong on Safari and slow connections.
         The preload hint above ensures Hafs downloads before the block period
         expires on any reasonable connection.
      ── ────────────────────────────────────────────────────────────────── */
      @font-face {
        font-family: 'Hafs';
        src: url('/Fonts/Hafs.ttf?v=2') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: block;
        unicode-range: U+0600-U+06FF, U+0750-U+077F, U+08A0-U+08FF,
                       U+FB50-U+FDFF, U+FE70-U+FEFF, U+0020-U+002F;
      }
      @font-face {
        font-family: 'KFGQPC Uthmanic Script HAFS';
        src: url('/Fonts/KFGQPC%20Uthmanic%20Script%20HAFS.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
        font-display: block;
        unicode-range: U+0600-U+06FF, U+0750-U+077F, U+08A0-U+08FF,
                       U+FB50-U+FDFF, U+FE70-U+FEFF, U+0020-U+002F;
      }
      @font-face {
        font-family: 'Arabic';
        src: url('/Fonts/arabic.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
        font-display: block;
        unicode-range: U+0600-U+06FF, U+0750-U+077F, U+08A0-U+08FF,
                       U+FB50-U+FDFF, U+FE70-U+FEFF, U+0020-U+002F;
      }
      @font-face {
        font-family: 'Elgharib KFGQPCHafs V10';
        src: url('/Fonts/Elgharib-KFGQPCHafs.V10.ttf?v=2') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: block;
        unicode-range: U+0600-U+06FF, U+0750-U+077F, U+08A0-U+08FF,
                       U+FB50-U+FDFF, U+FE70-U+FEFF, U+0020-U+002F;
      }
      @font-face {
        font-family: 'Elgharib HAFSTharwatEmara';
        src: url('/Fonts/Elgharib-HAFSTharwatEmara.otf?v=2') format('opentype');
        font-weight: normal;
        font-style: normal;
        font-display: block;
        unicode-range: U+0600-U+06FF, U+0750-U+077F, U+08A0-U+08FF,
                       U+FB50-U+FDFF, U+FE70-U+FEFF, U+0020-U+002F;
      }
      @font-face {

        src: url('/Fonts/UthmanTN_v2-0.ttf?v=2') format('truetype');

      @font-face {
        font-family: 'Uthmanic HAFS v22';

                       U+FB50-U+FDFF, U+FE70-U+FEFF, U+0020-U+002F;

      /* UI font — swap is fine here, fallback won't look broken */
      @font-face {
        font-family: 'Amiri Regular';
        src: url('/Fonts/Amiri-Regular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      .font-quranic {
        font-family: var(--quranic-font, 'Hafs'), 'Amiri Quran', serif;
      }
      @keyframes glow {
        0%, 100% { box-shadow: 0 0 5px 1px rgba(34, 197, 94, 0.6); }
        50% { box-shadow: 0 0 12px 3px rgba(34, 197, 94, 0.8); }
      }
      .animate-glow {
        animation: glow 2s ease-in-out infinite;
      }
      @keyframes tap-glow {
        0% { box-shadow: 0 0 0 0 rgba(4, 120, 87, 0.5); }

        100% { box-shadow: 0 0 0 0 rgba(4, 120, 87, 0); }
      }
      .animate-tap-glow {
        animation: tap-glow 0.6s ease-out;
      }
